apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: ecocheck
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default
      group_by: ['alertname', 'severity']
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 30m

    receivers:
      - name: default
        webhook_configs:
          - url: "http://example-webhook.local/alerts"
            send_resolved: true
