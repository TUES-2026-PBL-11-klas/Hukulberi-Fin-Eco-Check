apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecocheck
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/TUES-2026-PBL-11-klas/Hukulberi-Fin-Eco-Check.git
    targetRevision: main
    path: infra/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: ecocheck

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
