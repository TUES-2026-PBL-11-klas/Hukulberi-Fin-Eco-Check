apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: ecocheck
  labels:
    app: backend
    managed-by: kustomize
  annotations:
    description: "Backend environment secrets for EcoCheck API"
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:CHANGE_ME@db.YOUR_PROJECT_REF.supabase.co:5432/postgres"

  GEMINI_API_KEY: "CHANGE_ME"

  CORS_ORIGIN: "http://app.ecocheck.local"

  NODE_ENV: "production"

  PORT: "3000"
