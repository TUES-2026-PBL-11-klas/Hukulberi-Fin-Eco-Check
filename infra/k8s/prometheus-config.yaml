apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ecocheck
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager.ecocheck.svc.cluster.local:9093

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: ecocheck-backend
        metrics_path: /metrics
        static_configs:
          - targets:
              - backend.ecocheck.svc.cluster.local:3000
