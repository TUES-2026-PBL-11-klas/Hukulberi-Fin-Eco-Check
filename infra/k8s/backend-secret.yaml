# ──────────────────────────────────────────────────────────
# EcoCheck Backend Secrets
# ──────────────────────────────────────────────────────────
# IMPORTANT: This file contains PLACEHOLDER values only.
# Replace them with real secrets before applying to a cluster.
#
# For production, consider using:
#   - Sealed Secrets (Bitnami)
#   - External Secrets Operator + cloud vault
#   - SOPS-encrypted secrets
#
# Never commit real secrets to version control!
# ──────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: ecocheck
  labels:
    app: backend
    managed-by: kustomize
  annotations:
    description: "Backend environment secrets for EcoCheck API"
type: Opaque
stringData:
  # Supabase PostgreSQL connection string
  DATABASE_URL: "postgresql://postgres:CHANGE_ME@db.YOUR_PROJECT_REF.supabase.co:5432/postgres"

  # Gemini AI API key for signal classification
  GEMINI_API_KEY: "CHANGE_ME"

  # CORS origin (frontend URL)
  CORS_ORIGIN: "http://app.ecocheck.local"

  # Node environment
  NODE_ENV: "production"

  # Server port
  PORT: "3001"
